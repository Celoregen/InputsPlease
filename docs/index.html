<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请输入文本 - 第三方下载 </title>
    <meta name="description" content="请输入文本的第三方下载站">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --primary: #0d6efd;
            --primary-hover: #0b5ed7;
            --border: #e9ecef;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --text-sub: #a0a0a0;
                --primary: #4dabf7;
                --primary-hover: #339af0;
                --border: #333333;
                --shadow: 0 4px 12px rgba(0,0,0,0.3);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-sub); font-size: 1.1rem; }
        .version-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: 600;
        }

        .download-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn svg { margin-right: 8px; }

        .meta-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .changelog { margin-top: 40px; }
        .changelog h3 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .changelog ul { list-style: none; padding-left: 0; }
        .changelog li { margin-bottom: 8px; padding-left: 20px; position: relative; color: var(--text-sub); }
        .changelog li::before { content: "•"; position: absolute; left: 0; color: var(--primary); font-weight: bold; }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>请输入文本</h1>

        <!-- 👇 在这里修改版本号 -->
        <span class="version-badge">v1.0.0 Stable</span>
    </header>

    <main>

                下载最新版本 (PDF)
            </a>
            <div class="meta-info">
                <!-- 👇 在这里修改文件大小和日期 -->
                <span>📦 大小: 20.3 MB</span>
                <span>📅 更新: 2026-06-25</span>
            </div>
        </div>

        <section class="changelog">
            <h3>📝 更新日志 (v1.0.0)</h3>
            <ul>
                <li>🎉 创刊号正式发布</li>
                <li>✨ *</li>
                <li>🐛 *</li>
                <li>📚 *</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 InputsPlease. 由 <a href="https://github.com/Celoregen/InputsPlease" target="_blank">GitHub</a> 托管</p>
        <p style="margin-top:5px;">
            <a href="https://github.com/Celoregen/InputsPlease/releases" target="_blank">历史版本</a> · 
            <a href="https://github.com/Celoregen/InputsPlease/issues" target="_blank">问题反馈</a>
        </p>
    </footer>
</div>

</body>
</html>
